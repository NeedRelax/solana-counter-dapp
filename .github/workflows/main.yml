name: Build, Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SOLANA_VERSION: "1.18.15"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # 策略1：指定一个具体的、较新的 nightly 版本
          toolchain: nightly-2024-05-01 

      - name: Install Solana from GitHub Releases
        run: |
          SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          wget $SOLANA_RELEASE_URL
          tar -jxvf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$(pwd)/solana-release/bin" >> $GITHUB_PATH
        
      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install 0.29.0
          avm use 0.29.0
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Verify Tools Installation
        run: |
          solana --version
          anchor --version
          rustc --version

      - name: Install Node.js dependencies
        run: npm install

      - name: Regenerate Cargo.lock file
        # 策略2：删除旧的 lock 文件并让 Cargo 重新生成一个兼容的
        working-directory: ./anchor
        run: |
          echo "Removing potentially incompatible Cargo.lock"
          rm -f Cargo.lock
          echo "Generating a new lock file based on CI's toolchain"
          cargo generate-lockfile

      - name: Build Anchor program
        run: anchor build
        working-directory: ./anchor

      - name: Run Anchor tests
        run: anchor test
        working-directory: ./anchor
  deploy-to-devnet:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      SOLANA_VERSION: "1.18.15"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # 关键修复：使用 nightly 版本的 Rust 工具链
          toolchain: nightly


      - name: Install Solana from GitHub Releases
        run: |
          SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          wget $SOLANA_RELEASE_URL
          tar -jxvf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$(pwd)/solana-release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install 0.29.0
          avm use 0.29.0
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
        
      - name: Set up Devnet wallet
        run: echo "${{ secrets.SOLANA_KEYPAIR_SECRET }}" > ~/.config/solana/id.json

      - name: Deploy to Devnet
        # 关键修复：在 'anchor' 子目录中运行
        run: anchor deploy
        working-directory: ./anchor