name: Solana Anchor CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: Setup Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        components: rustfmt, clippy
        override: true

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          anchor/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('anchor/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install Solana CLI
      # 尝试使用一个更具体的版本标签
      uses: solana-labs/setup-solana@v1.3.0 # <--- 改动在这里，尝试一个具体的 tag
      with:
        solana-version: '1.18.18'

    - name: Verify Solana CLI installation
      run: |
        solana --version
        solana-keygen --version

    - name: Install Anchor Version Manager (AVM) and Anchor CLI
      run: |
        cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
        avm install 0.31.1
        avm use 0.31.1
        echo "$HOME/.avm/bin" >> $GITHUB_PATH
        anchor --version

    - name: Build Anchor program (Rust)
      run: npm run anchor-build

    - name: Test Anchor program (Rust)
      run: npm run anchor-test

    - name: Run Frontend CI (Build, Lint, Format Check)
      run: npm run ci