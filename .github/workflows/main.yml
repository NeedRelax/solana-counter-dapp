name: Build, Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # 关键修复：硬编码一个具体的、已知的稳定版本号
      SOLANA_VERSION: "1.87.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Solana from GitHub Releases
        run: |
          # 现在 SOLANA_VERSION 是一个具体的版本号，URL 构造会是正确的
          SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          
          echo "Downloading Solana from: $SOLANA_RELEASE_URL"
          wget $SOLANA_RELEASE_URL
          tar -jxvf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          
          echo "$(pwd)/solana-release/bin" >> $GITHUB_PATH
        
      - name: Install Anchor
        run: |
          # 固定 Anchor 版本以提高稳定性
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install 0.29.0 # 固定一个已知兼容的版本
          avm use 0.29.0
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Verify Solana and Anchor Installation
        run: |
          solana --version
          anchor --version

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Anchor program
        run: anchor build

      - name: Run Anchor tests
        run: anchor test

  deploy-to-devnet:
    # deploy-to-devnet job 也需要做同样的修改
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      SOLANA_VERSION: "1.18.15"

    steps:
      # ... (checkout, node, rust)
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Solana from GitHub Releases
        run: |
          SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          echo "Downloading Solana from: $SOLANA_RELEASE_URL"
          wget $SOLANA_RELEASE_URL
          tar -jxvf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$(pwd)/solana-release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install 0.29.0
          avm use 0.29.0
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
        
      - name: Set up Devnet wallet
        run: echo "${{ secrets.SOLANA_KEYPAIR_SECRET }}" > ~/.config/solana/id.json

      - name: Deploy to Devnet
        run: anchor deploy