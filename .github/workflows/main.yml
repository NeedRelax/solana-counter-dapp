name: Build and Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Step 1: Set up Rust, Solana, and Anchor environment
      # --------------------------------------------------
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Solana CLI
        # --- FIX: Use the official install script, this is the most robust method ---
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.17/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          solana --version

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor anchor-cli --locked --force

      - name: Cache Anchor build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ./anchor/target
            ~/.cargo/git
            ~/.cargo/registry
          key: ${{ runner.os }}-cargo-anchor-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-anchor-

      # --------------------------------------------------
      # Step 2: Build and Test Anchor Program
      # --------------------------------------------------
      - name: Build Anchor program
        run: anchor build
        working-directory: ./anchor

      - name: Test Anchor program
        run: anchor test
        working-directory: ./anchor

      # --------------------------------------------------
      # Step 3: Set up Node.js environment
      # --------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      # --------------------------------------------------
      # Step 4: Build and Test Frontend
      # --------------------------------------------------
      - name: Install Node.js dependencies
        run: npm ci

      - name: Lint frontend code
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

      - name: Build frontend
        run: npm run build