name: Build, Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 使用最新的 v4 版本

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Solana
        uses: solana-labs/setup-solana@v1
        with:
          solana-version: 'latest'

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install latest
          avm use latest

      - name: Add Anchor to PATH
        # 这是关键一步，avm 安装的 anchor 不在默认路径中
        run: echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Anchor program
        run: anchor build

      - name: Run Anchor tests
        run: anchor test

  deploy-to-devnet:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Solana
        uses: solana-labs/setup-solana@v1
        with:
          solana-version: 'latest'

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install latest
          avm use latest

      - name: Add Anchor to PATH
        run: echo "$HOME/.avm/bin" >> $GITHUB_PATH
        
      - name: Set up Devnet wallet
        run: echo "${{ secrets.SOLANA_KEYPAIR_SECRET }}" > ~/.config/solana/id.json

      - name: Deploy to Devnet
        run: |
          solana config set --url devnet
          anchor deploy