name: Build, Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # 定义一个变量，方便统一修改 Solana 版本
      SOLANA_VERSION: "stable" # 你可以换成具体的版本号，如 "1.18.15"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Solana from GitHub Releases
        # 备用方案：直接从 GitHub Releases 下载，绕过不稳定的 release.solana.com
        run: |
          SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          if [ "$SOLANA_VERSION" = "stable" ] || [ "$SOLANA_VERSION" = "latest" ]; then
            SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/${SOLANA_VERSION}/download/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          fi
          
          echo "Downloading Solana from: $SOLANA_RELEASE_URL"
          wget $SOLANA_RELEASE_URL
          tar -jxvf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          
          # 将解压后的 Solana bin 目录添加到路径
          echo "$(pwd)/solana-release/bin" >> $GITHUB_PATH
        
      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install latest
          avm use latest
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Verify Solana and Anchor Installation
        run: |
          solana --version
          anchor --version

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Anchor program
        run: anchor build

      - name: Run Anchor tests
        run: anchor test

  deploy-to-devnet:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      SOLANA_VERSION: "stable"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Solana from GitHub Releases
        run: |
          SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          if [ "$SOLANA_VERSION" = "stable" ] || [ "$SOLANA_VERSION" = "latest" ]; then
            SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/${SOLANA_VERSION}/download/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          fi
      
          echo "Downloading Solana from: $SOLANA_RELEASE_URL"
          curl -L --retry 5 --retry-delay 3 --retry-connrefused --max-time 60 -o solana.tar.bz2 "$SOLANA_RELEASE_URL"
          tar -jxvf solana.tar.bz2
      
          echo "$(pwd)/solana-release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install latest
          avm use latest
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
        
      - name: Set up Devnet wallet
        run: echo "${{ secrets.SOLANA_KEYPAIR_SECRET }}" > ~/.config/solana/id.json

      - name: Deploy to Devnet
        run: anchor deploy