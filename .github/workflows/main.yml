name: Build, Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SOLANA_VERSION: "1.18.17"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Manually Install a very recent nightly Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup install nightly-2024-06-10
          rustup default nightly-2024-06-10

      - name: Install Solana from a Confirmed GitHub Release
        run: |
          SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          wget $SOLANA_RELEASE_URL
          tar -jxvf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$(pwd)/solana-release/bin" >> $GITHUB_PATH
        
      - name: Install latest Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install latest
          avm use latest
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Verify Tools Installation
        run: |
          solana --version
          anchor --version
          rustc --version

      - name: Install Node.js dependencies
        run: npm install
        
      - name: Remove local Cargo.lock before build
        # 终极修复：在构建前直接删除不兼容的 lock 文件
        working-directory: ./anchor
        run: |
          echo "Removing potentially incompatible Cargo.lock to force regeneration by anchor build"
          rm -f Cargo.lock

      - name: Build Anchor program
        # anchor build 会在没有 lock 文件的情况下自动运行 cargo resolve
        run: anchor build
        working-directory: ./anchor

      - name: Run Anchor tests
        run: anchor test
        working-directory: ./anchor

  deploy-to-devnet:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      SOLANA_VERSION: "1.18.17"
    steps:
      # ... (此处省略重复代码，但请确保 deploy-to-devnet 也包含了手动安装 Rust 和删除 lock 文件的步骤)
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Manually Install a very recent nightly Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup install nightly-2024-06-10
          rustup default nightly-2024-06-10
      - name: Install Solana from a Confirmed GitHub Release
        run: |
          SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          wget $SOLANA_RELEASE_URL
          tar -jxvf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$(pwd)/solana-release/bin" >> $GITHUB_PATH
      - name: Install latest Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install latest
          avm use latest
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
          
      - name: Remove local Cargo.lock before deploy
        working-directory: ./anchor
        run: rm -f Cargo.lock
          
      - name: Set up Devnet wallet
        run: echo "${{ secrets.SOLANA_KEYPAIR_SECRET }}" > ~/.config/solana/id.json
      
      - name: Deploy to Devnet
        run: anchor deploy
        working-directory: ./anchor