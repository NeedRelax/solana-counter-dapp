name: Build and Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Step 1: Set up Rust, Solana, and Anchor environment
      # --------------------------------------------------
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Set up Solana
        # --- FIX: Using the correct, community-maintained action ---
        uses: michael-spengler/setup-solana@v1
        with:
          # Note: The parameter name is 'solana-version', not 'version'
          solana-version: '1.18.17'

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor anchor-cli --locked --force

      - name: Cache Anchor build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ./anchor/target
            ~/.cargo/git
            ~/.cargo/registry
          key: ${{ runner.os }}-cargo-anchor-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-anchor-

      # --------------------------------------------------
      # Step 2: Build and Test Anchor Program
      # --------------------------------------------------
      - name: Build Anchor program
        run: anchor build
        working-directory: ./anchor

      - name: Test Anchor program
        run: anchor test
        working-directory: ./anchor

      # --------------------------------------------------
      # Step 3: Set up Node.js environment
      # --------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Use a recent LTS version
          node-version: '20.x'
          # Use npm cache provided by setup-node
          cache: 'npm'

      # --------------------------------------------------
      # Step 4: Build and Test Frontend
      # --------------------------------------------------
      - name: Install Node.js dependencies
        # 'npm ci' is recommended for CI for faster, more reliable installs
        run: npm ci

      - name: Lint frontend code
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

      - name: Build frontend
        run: npm run build