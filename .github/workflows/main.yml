name: Build, Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Manually Install a very recent nightly Rust toolchain
        # 安装一个足够新的 nightly 版本 (例如 1.81.0-nightly 或更高)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          # 我们直接安装最新的 nightly，而不是固定一个日期
          rustup install nightly
          rustup default nightly

      - name: Install LATEST Solana CLI and Build Tools
        run: |
          # 使用 'latest' 频道来获取最新的 Solana 工具链 (2.x)
          sh -c "$(curl --retry 5 --retry-delay 5 -sSfL https://release.solana.com/latest/install)"
          # 将 Solana CLI 添加到路径
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          # 确保所有构建工具都被安装
          solana-install init $(solana-version --version | awk '{print $2}')
        
      - name: Install latest Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install latest
          avm use latest
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Verify Tools Installation
        run: |
          solana --version
          anchor --version
          rustc --version
          which rustc # 打印 rustc 的路径，用于下一步

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Anchor program with correct Rust compiler
        working-directory: ./anchor
        run: |
          # 找到我们通过 rustup 安装的 nightly rustc 的确切路径
          NIGHTLY_RUSTC_PATH=$(which rustc)
          echo "Forcing anchor to use rustc at: $NIGHTLY_RUSTC_PATH"
          # 在执行 anchor build 的同一行命令中，设置 RUSTC 环境变量
          RUSTC=$NIGHTLY_RUSTC_PATH anchor build

      - name: Run Anchor tests
        working-directory: ./anchor
        run: |
          NIGHTLY_RUSTC_PATH=$(which rustc)
          RUSTC=$NIGHTLY_RUSTC_PATH anchor test

  # deploy-to-devnet job 也需要做同样的修改
  deploy-to-devnet:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      # (此处省略 checkout, node, rust, solana, anchor 的重复代码，请确保它们和上面 build-and-test 中的一致)
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Manually Install a very recent nightly Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup install nightly
          rustup default nightly
      - name: Install LATEST Solana CLI and Build Tools
        run: |
          sh -c "$(curl --retry 5 --retry-delay 5 -sSfL https://release.solana.com/latest/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          solana-install init $(solana-version --version | awk '{print $2}')
      - name: Install latest Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install latest
          avm use latest
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
      - name: Set up Devnet wallet
        run: echo "${{ secrets.SOLANA_KEYPAIR_SECRET }}" > ~/.config/solana/id.json
      - name: Build Anchor program with correct Rust compiler
        working-directory: ./anchor
        run: |
          NIGHTLY_RUSTC_PATH=$(which rustc)
          RUSTC=$NIGHTLY_RUSTC_PATH anchor build
      - name: Deploy to Devnet
        working-directory: ./anchor
        run: |
          NIGHTLY_RUSTC_PATH=$(which rustc)
          RUSTC=$NIGHTLY_RUSTC_PATH anchor deploy