name: Build, Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # 终极修复：硬编码一个在 GitHub Releases 上确认存在的、带有完整发布包的版本
      SOLANA_VERSION: "1.18.19"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install latest nightly Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: Install Solana from GitHub Releases (Reliable Source)
        # 我们从 GitHub 直接下载，绕过不稳定的 release.solana.com
        run: |
          SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          echo "Downloading Solana from confirmed URL: $SOLANA_RELEASE_URL"
          wget $SOLANA_RELEASE_URL
          tar -jxvf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$(pwd)/solana-release/bin" >> $GITHUB_PATH
        
      - name: Install latest Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install latest
          avm use latest
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Verify Tools Installation
        run: |
          solana --version
          anchor --version
          rustc --version

      - name: Install Node.js dependencies
        run: npm install

      - name: Regenerate Cargo.lock to match CI environment
        working-directory: ./anchor
        run: |
          rm -f Cargo.lock
          cargo generate-lockfile
      
      - name: Build Anchor program
        run: anchor build
        working-directory: ./anchor

      - name: Run Anchor tests
        run: anchor test
        working-directory: ./anchor

  deploy-to-devnet:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      SOLANA_VERSION: "1.18.19" # 确保版本一致
    steps:
      # (此处省略 checkout, node, rust, solana, anchor, regenerate 的重复代码，请确保它们和上面 build-and-test 中的一致)
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install latest nightly Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
      - name: Install Solana from GitHub Releases (Reliable Source)
        run: |
          SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          wget $SOLANA_RELEASE_URL
          tar -jxvf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$(pwd)/solana-release/bin" >> $GITHUB_PATH
      - name: Install latest Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install latest
          avm use latest
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Regenerate Cargo.lock to match CI environment
        working-directory: ./anchor
        run: |
          rm -f Cargo.lock
          cargo generate-lockfile

      - name: Set up Devnet wallet
        run: echo "${{ secrets.SOLANA_KEYPAIR_SECRET }}" > ~/.config/solana/id.json
      
      - name: Deploy to Devnet
        run: anchor deploy
        working-directory: ./anchor