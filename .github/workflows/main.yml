name: Build, Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SOLANA_VERSION: "1.18.15"
      # 定义项目子目录的变量，如果你的仓库根目录下的文件夹名不同，只需修改这里
      PROJECT_DIR: ./solana-counter-dapp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # 将代码检出到指定的子目录中，以匹配本地结构
        with:
          path: ${{ env.PROJECT_DIR }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Solana from GitHub Releases
        run: |
          SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          wget $SOLANA_RELEASE_URL
          tar -jxvf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$(pwd)/solana-release/bin" >> $GITHUB_PATH
        
      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install 0.29.0
          avm use 0.29.0
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Verify Tools Installation
        run: |
          solana --version
          anchor --version

      - name: Install Node.js dependencies
        # 关键修复：在正确的项目子目录中运行 npm install
        run: npm install
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Build Anchor program
        # 关键修复：在正确的项目子目录中运行 anchor build
        run: anchor build
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Run Anchor tests
        # 关键修复：在正确的项目子目录中运行 anchor test
        run: anchor test
        working-directory: ${{ env.PROJECT_DIR }}

  deploy-to-devnet:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      SOLANA_VERSION: "1.18.15"
      PROJECT_DIR: ./solana-counter-dapp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: ${{ env.PROJECT_DIR }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Solana from GitHub Releases
        run: |
          # ... (和上面一样)
          SOLANA_RELEASE_URL="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          wget $SOLANA_RELEASE_URL
          tar -jxvf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$(pwd)/solana-release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          # ... (和上面一样)
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install 0.29.0
          avm use 0.29.0
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
        
      - name: Set up Devnet wallet
        run: echo "${{ secrets.SOLANA_KEYPAIR_SECRET }}" > ~/.config/solana/id.json

      - name: Deploy to Devnet
        # 关键修复：在正确的项目子目录中运行 anchor deploy
        run: anchor deploy
        working-directory: ${{ env.PROJECT_DIR }}