name: Build, Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Rust and Solana
        uses: cachix/install-nix-action@v20
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Anchor
        run: |
          nix-shell --run "
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install latest
          avm use latest
          "

      - name: Build Anchor program
        run: nix-shell --run "anchor build"

      - name: Run Anchor tests
        run: nix-shell --run "anchor test"

  deploy-to-devnet:
    runs-on: ubuntu-latest
    needs: build-and-test # 只有在 build-and-test 成功后才运行
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' # 只在推送到 main 分支时部署
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Rust and Solana
        uses: cachix/install-nix-action@v20
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Anchor
        run: |
          nix-shell --run "
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install latest
          avm use latest
          "

      - name: Set up Devnet wallet
        # 从 GitHub Secrets 中获取部署者的私钥
        run: echo "${{ secrets.SOLANA_KEYPAIR_SECRET }}" > ~/.config/solana/id.json

      - name: Deploy to Devnet
        run: |
          nix-shell --run "
          solana config set --url devnet
          anchor deploy
          "