name: Build, Test and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-anchor:
    name: Anchor Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anchor
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.17.20/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor anchor-cli --locked

      - name: Build Anchor Program
        run: anchor build

      - name: Run Anchor Tests
        run: anchor test

  frontend-nextjs:
    name: Next.js Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint . --max-warnings=0

      - name: Run Tests (optional)
        run: npm run test || echo "Tests skipped or not defined"

      - name: Build Next.js App
        run: npm run build

      - name: Export static (if using static export)
        run: npm run export || echo "Export skipped"
