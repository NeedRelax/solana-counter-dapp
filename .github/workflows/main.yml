name: Build, Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 使用这个 Action 一步到位安装 Solana, Rust, 和 Anchor
      - name: Setup Anchor environment
        uses: armada-alliance/anchor-actions@v1
        with:
          anchor-version: 'latest' # 你可以指定版本，例如 '0.29.0'
          solana-version: 'latest'
          node-version: '18'

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Anchor program
        run: anchor build

      - name: Run Anchor tests
        run: anchor test

  deploy-to-devnet:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 同样使用这个 Action 来准备部署环境
      - name: Setup Anchor environment
        uses: armada-alliance/anchor-actions@v1
        with:
          anchor-version: 'latest'
          solana-version: 'latest'
          node-version: '18'

      - name: Set up Devnet wallet
        run: echo "${{ secrets.SOLANA_KEYPAIR_SECRET }}" > ~/.config/solana/id.json

      - name: Deploy to Devnet
        run: |
          solana config set --url devnet
          anchor deploy